<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgendaPro</title>
<style>
:root{--bg:#0f1116;--panel:#171b24;--panel2:#1f2430;--border:#2b3241;--text:#e8ecf4;--muted:#96a0b5;--accent:#7c6cff;--accent2:#ff6b8b;--success:#4bc08d;--warning:#ffbf5b;--danger:#ff6b6b;--radius:16px;--shadow:0 10px 30px rgba(0,0,0,.35)}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#0c0e13 0%,#111520 100%);color:var(--text)}
.app{display:flex;min-height:100vh}
.sidebar{width:250px;background:rgba(23,27,36,.96);border-right:1px solid var(--border);padding:22px 14px;position:fixed;inset:0 auto 0 0}
.brand{padding:10px 12px 18px;border-bottom:1px solid var(--border);margin-bottom:14px}
.brand h1{margin:0;font-size:1.2rem;color:var(--accent)}
.brand p{margin:4px 0 0;color:var(--muted);font-size:.85rem}
.nav{display:flex;flex-direction:column;gap:8px}
.nav button{border:0;background:transparent;color:var(--muted);text-align:left;padding:12px 14px;border-radius:12px;cursor:pointer;font-size:.95rem;font-weight:600}
.nav button:hover{background:var(--panel2);color:var(--text)}
.nav button.active{background:rgba(124,108,255,.14);color:var(--accent)}
.sidebar .datebox{position:absolute;left:14px;right:14px;bottom:18px;color:var(--muted);font-size:.82rem;padding-top:14px;border-top:1px solid var(--border)}
.main{margin-left:250px;width:calc(100% - 250px);padding:26px}
.section{display:none}
.section.active{display:block}
.header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px}
.header h2{margin:0 0 6px;font-size:1.6rem}
.header p{margin:0;color:var(--muted)}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:700}
.btn:hover{filter:brightness(1.05)}
.btn.primary{background:var(--accent);border-color:transparent;color:#fff}
.btn.ghost{background:var(--panel2)}
.btn.danger{background:rgba(255,107,107,.12);color:var(--danger)}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
.grid2{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-bottom:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:18px}
.card{background:rgba(23,27,36,.95);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.card-title{margin:0 0 14px;font-size:.82rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.stat{padding:16px;border-radius:16px;background:rgba(31,36,48,.7);border:1px solid var(--border)}
.stat .icon{font-size:1.5rem;margin-bottom:10px}
.stat .label{color:var(--muted);font-size:.8rem;font-weight:700}
.stat .value{font-size:2rem;font-weight:900;margin-top:4px}
.stat .sub{color:var(--muted);font-size:.8rem;margin-top:4px}
.list{display:flex;flex-direction:column;gap:10px}
.item{display:flex;align-items:flex-start;gap:12px;background:rgba(31,36,48,.75);border:1px solid var(--border);border-radius:14px;padding:12px}
.dot{width:6px;border-radius:999px;align-self:stretch;min-height:42px}
.item-main{flex:1}
.item-title{font-weight:800;margin-bottom:4px}
.item-meta{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:.8rem}
.badge{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;font-size:.72rem;font-weight:800;background:rgba(255,255,255,.05)}
.badge.work{color:#a998ff;background:rgba(124,108,255,.13)}
.badge.health{color:#69d8a7;background:rgba(75,192,141,.12)}
.badge.personal{color:#ff8cad;background:rgba(255,107,139,.12)}
.badge.study{color:#8ef0c9;background:rgba(75,192,141,.10)}
.badge.other{color:#ffd47d;background:rgba(255,191,91,.12)}
.status{font-size:.72rem;font-weight:900;padding:4px 8px;border-radius:999px;white-space:nowrap}
.status.pending{background:rgba(255,191,91,.12);color:var(--warning)}
.status.progress{background:rgba(124,108,255,.14);color:var(--accent)}
.status.done{background:rgba(75,192,141,.12);color:var(--success)}
.small-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.small-actions .btn{padding:8px 10px;border-radius:10px;font-size:.82rem}
.muted{color:var(--muted)}
.empty{text-align:center;color:var(--muted);padding:30px 14px}
.empty .big{font-size:2rem;margin-bottom:10px}
.progress{height:9px;background:#2a3140;border-radius:999px;overflow:hidden}
.fill{height:100%;border-radius:999px}
.bars{display:flex;align-items:flex-end;gap:10px;min-height:120px}
.barcol{flex:1;text-align:center}
.bar{width:100%;min-height:6px;border-radius:10px 10px 0 0;background:var(--accent);margin-top:auto}
.barlabel{margin-top:8px;font-size:.74rem;color:var(--muted)}
.score-wrap{display:flex;align-items:center;justify-content:center;gap:18px}
.ring{position:relative;width:140px;height:140px}
.ring svg{transform:rotate(-90deg)}
.ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .num{font-size:2rem;font-weight:900;color:var(--accent)}
.ring .txt{font-size:.72rem;color:var(--muted);font-weight:800;letter-spacing:.08em}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-head{text-align:center;font-size:.75rem;color:var(--muted);font-weight:800;padding:4px 0}
.cal-day{min-height:44px;border-radius:12px;border:1px solid var(--border);background:rgba(31,36,48,.55);cursor:pointer;padding:8px;font-size:.88rem;position:relative}
.cal-day:hover{background:rgba(31,36,48,.95)}
.cal-day.today{outline:2px solid rgba(124,108,255,.4)}
.cal-day.selected{background:var(--accent);color:#fff}
.cal-day.other{opacity:.35}
.cal-dot{width:6px;height:6px;border-radius:999px;background:var(--accent2);position:absolute;bottom:7px;left:50%;transform:translateX(-50%)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,input,textarea{width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--border);background:var(--panel2);color:var(--text);outline:none}
textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:12px}
.form-group label{display:block;margin-bottom:6px;color:var(--muted);font-size:.82rem;font-weight:800}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.68);display:none;align-items:center;justify-content:center;z-index:1000;padding:18px}
.modal-overlay.open{display:flex}
.modal{width:min(620px,100%);background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:18px}
.modal h3{margin:0 0 14px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
.timer{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
.timer-display{font-size:3.2rem;font-weight:900;letter-spacing:1px;font-variant-numeric:tabular-nums;color:var(--accent)}
.pom-dots{display:flex;gap:8px}
.pom-dot{width:11px;height:11px;border-radius:999px;background:#2f3647}
.pom-dot.on{background:var(--accent)}
.divider{height:1px;background:var(--border);margin:16px 0}
.toast{position:fixed;bottom:22px;right:22px;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:12px;box-shadow:var(--shadow);opacity:0;transform:translateY(14px);transition:.25s;z-index:2000;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:1100px){.grid4{grid-template-columns:repeat(2,1fr)}.grid2,.grid3{grid-template-columns:1fr}}
@media(max-width:760px){.sidebar{position:static;width:100%;border-right:none;border-bottom:1px solid var(--border)}.main{margin-left:0;width:100%;padding:16px}.app{display:block}.grid4{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>AgendaPro</h1>
      <p>Agenda, atividades e produtividade</p>
    </div>
    <div class="nav">
      <button class="active" onclick="showSection('dashboard',this)">Dashboard</button>
      <button onclick="showSection('agenda',this)">Agenda</button>
      <button onclick="showSection('atividades',this)">Atividades</button>
      <button onclick="showSection('timer',this)">Timer / Foco</button>
      <button onclick="showSection('produtividade',this)">
